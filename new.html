<!DOCTYPE html>
<html>
<head>
<title>Delivery Challan</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family: Arial;
padding:20px;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid black;
padding:6px;
text-align:center;
}

input{
width:90%;
padding:5px;
}

button{
margin-top:20px;
padding:10px 15px;
}

</style>
</head>

<body>

<h2>LISMOUNT TEX</h2>
<h3 style="text-align:center;">Delivery Challan</h3>

Challan No : <span id="challan"></span><br>
Date : <span id="date"></span>

<br><br>

Customer Name  
<br>
<input type="text" id="customer">

<br><br>

Customer Address  
<br>
<input type="text" id="address">

<table id="table">

<tr>

<th>Roll No</th>
<th>Quality</th>
<th>Meter</th>
<th>Rate</th>
<th>Amount</th>
<th>GST 5%</th>
<th>Total</th>

</tr>

<tr>

<td><input></td>
<td><input></td>

<td>
<input type="number" class="meter" oninput="calc(this)">
</td>

<td>
<input type="number" class="rate" oninput="calc(this)">
</td>

<td class="amount">0</td>
<td class="gst">0</td>
<td class="total">0</td>

</tr>

</table>

<button onclick="addRow()">Add Roll</button>

<br>

<button onclick="pdf()">Download PDF</button>

<script>

document.getElementById("challan").innerText=1001

let today=new Date().toLocaleDateString()

document.getElementById("date").innerText=today


function calc(e){

let r=e.parentElement.parentElement

let meter=r.querySelector(".meter").value || 0
let rate=r.querySelector(".rate").value || 0

let amount=meter*rate
let gst=amount*0.05
let total=amount+gst

r.querySelector(".amount").innerText=amount.toFixed(2)
r.querySelector(".gst").innerText=gst.toFixed(2)
r.querySelector(".total").innerText=total.toFixed(2)

}

function addRow(){

let t=document.getElementById("table")

let r=t.insertRow()

r.innerHTML=`

<td><input></td>
<td><input></td>

<td>
<input type="number" class="meter" oninput="calc(this)">
</td>

<td>
<input type="number" class="rate" oninput="calc(this)">
</td>

<td class="amount">0</td>
<td class="gst">0</td>
<td class="total">0</td>

`

}

function pdf(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text("Delivery Challan",90,20)

doc.text("Customer : "+document.getElementById("customer").value,20,40)

doc.text("Address : "+document.getElementById("address").value,20,50)

doc.save("challan.pdf")

}

</script>

</body>
</html>
