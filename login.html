<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ERP System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
}

.input-box {
    width: 100%;
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
}

.input-box input:focus {
    border-color: #4facfe;
}

button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

.error {
    color: red;
    font-size: 14px;
    display: none;
}

</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <p class="error" id="error">Invalid Login</p>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // Simple Login (you can change username & password)
    if(user === "admin" && pass === "1234") {
        alert("Login Success");
        window.location.href = "https://mohan184848-max.github.io/sample/"; // next page
    } else {

        document.getElementById("error").style.display = "block";
    }
   
}
</script>

</body>
</html>
